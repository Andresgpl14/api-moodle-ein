name: Deploy (Serverless)

on:
  workflow_dispatch:
    inputs:
      aws_access_key_id:
        description: AWS Access Key ID for deployment
        required: true
        type: string
      aws_secret_access_key:
        description: AWS Secret Access Key for deployment
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: main

    steps:
      - name: Checkout  branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Mask AWS credentials
        run: |
          echo "::add-mask::${{ inputs.aws_access_key_id }}"
          echo "::add-mask::${{ inputs.aws_secret_access_key }}"
          echo "::add-mask::${{ secrets.SERVERLESS_ACCESS_KEY }}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ inputs.aws_access_key_id }}
          aws-secret-access-key: ${{ inputs.aws_secret_access_key }}
          aws-region: us-east-1

      - name: Create AWS profile required by Serverless
        env:
          AWS_ACCESS_KEY_ID: ${{ inputs.aws_access_key_id }}
          AWS_SECRET_ACCESS_KEY: ${{ inputs.aws_secret_access_key }}
        run: |
          mkdir -p ~/.aws
          cat > ~/.aws/credentials <<EOF
          [ois-prd]
          aws_access_key_id=${AWS_ACCESS_KEY_ID}
          aws_secret_access_key=${AWS_SECRET_ACCESS_KEY}
          EOF
          cat > ~/.aws/config <<EOF
          [profile ois-prd]
          region=us-east-1
          output=json
          EOF

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Deploy to dev with Serverless
        env:
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
        run: npx serverless deploy --stage dev --region us-east-1
